name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --dev --extra ipmi --python ${{ matrix.python-version }}
      - run: uv run pytest -v -m "not integration"
      - run: uv run ruff check

  integration:
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - name: Install runtime + test deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-ezsnmp python3-paho-mqtt python3-pytest python3-pip git
          # snmpsim from pip: the conftest expects the `snmpsim-command-responder`
          # command (snmpsim-lextudio); trixie's apt `snmpsim` (0.4.5) ships a
          # different command. ezsnmp comes from apt (the deployed artifact).
          pip install --break-system-packages snmpsim-lextudio
      - uses: actions/checkout@v4
      - name: Trust repo directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Run integration tests (real ezsnmp + snmpsim)
        run: PYTHONPATH=src python3 -m pytest tests/ -m integration -v
